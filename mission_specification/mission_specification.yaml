executor_owned_mode: "takeoff1"

entries:
  - key: "takeoff1"
    mode_name: "Takeoff 1"
    behavior_tree_xml_file: "$BEHAVIOR_TREES_DIR/takeoff_test_tree.xml"
    allow_activate_when_disarmed: true
    next_mode: "up_down"

  - key: "up_down"
    mode_name: "Up Down"
    behavior_tree_xml_file: "$BEHAVIOR_TREES_DIR/up_down_test_tree.xml"
    allow_activate_when_disarmed: true
    next_mode: "takeoff2"

  - key: "takeoff2"
    mode_name: "Takeoff 2"
    behavior_tree_xml_file: "$BEHAVIOR_TREES_DIR/takeoff_test_tree.xml"
    allow_activate_when_disarmed: true
